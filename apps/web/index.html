<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BetterCodex Store</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">
        <img src="/assets/bettercodex-mark.svg" alt="" width="36" height="36">
        <span>BetterCodex</span>
      </a>
      <nav>
        <a href="#store">Store</a>
        <a href="#submit">Submit</a>
        <a href="https://github.com/companion-inc/bettercodex">GitHub</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">Community Store for Codex</p>
          <h1>Mods, themes, and skills that install into Codex.</h1>
          <p class="lede">Browse the hosted Store here, then install from the in-Codex Store panel.</p>
        </div>
        <img src="/assets/bettercodex-mark.svg" alt="" class="hero-mark">
      </section>

      <section id="store" class="store-shell">
        <div class="toolbar">
          <label class="search">
            <span>Search</span>
            <input id="search" type="search" placeholder="Search mods, authors, tags">
          </label>
          <div class="segments" aria-label="Filter by type">
            <button class="active" data-type="all">All</button>
            <button data-type="plugin">Plugins</button>
            <button data-type="theme">Themes</button>
            <button data-type="skill">Skills</button>
          </div>
        </div>
        <div id="catalog" class="catalog" aria-live="polite"></div>
      </section>

      <section id="submit" class="submit-shell">
        <div>
          <h2>Submit to the Store</h2>
          <p>Submissions are validated by the API and opened for review.</p>
        </div>
        <form id="submission-form">
          <input name="name" placeholder="Name" required>
          <select name="type" required>
            <option value="plugin">Plugin</option>
            <option value="theme">Theme</option>
            <option value="skill">Skill</option>
          </select>
          <input name="author" placeholder="Author" required>
          <input name="version" placeholder="Version" value="0.1.0" required>
          <input name="fileName" placeholder="File name" required>
          <input name="downloadUrl" placeholder="Raw GitHub download URL" required>
          <textarea name="description" placeholder="Description" required></textarea>
          <button type="submit">Submit</button>
          <p id="submission-status" role="status"></p>
        </form>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
